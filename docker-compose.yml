services:
  # Сервис базы данных PostgreSQL
  db:
    # Используем официальный образ PostgreSQL 15 на Alpine (легковесный)
    image: postgres:15-alpine
    
    # Имя контейнера для удобного обращения
    container_name: react_vue_db
    
    # Переменные окружения для PostgreSQL
    environment:
      # POSTGRES_DB: имя базы данных, которая создастся при старте
      POSTGRES_DB: react_vue_db
      
      # POSTGRES_USER: имя пользователя БД
      POSTGRES_USER: react_vue_user
      
      # POSTGRES_PASSWORD: пароль пользователя
      POSTGRES_PASSWORD: Qq111111
    
    # Проброс портов: порт хоста : порт контейнера
    # Теперь к БД можно подключиться с хоста через порт 5432
    ports:
      - "5432:5432"
    
    # Том для сохранения данных БД (чтобы данные не терялись при перезапуске)
    volumes:
      - react_vue_postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    
    # Проверка здоровья контейнера
    healthcheck:
      # pg_isready - утилита для проверки готовности PostgreSQL
      test: ["CMD-SHELL", "pg_isready -U react_vue_user -d react_vue_db"]
      interval: 10s      # проверяем каждые 10 секунд
      timeout: 5s        # ждем ответа 5 секунд
      retries: 5         # 5 попыток перед пометкой как unhealthy
    networks:
      - react_vue_network

  # Сервис API на Koa
  api:
    container_name: react_vue_api

    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=react_vue_db
      - DB_USER=react_vue_user
      - DB_PASSWORD=Qq111111
      - DB_NAME=react_vue_db
      - DB_PORT=5432
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - react_vue_network

  # ========== VUE FRONTEND (PRODUCTION) ==========
  vue:
    build:
      context: ./vue
      dockerfile: Dockerfile
    container_name: vue_phonebook
    ports:
      - "8081:80"
    depends_on:
      - api
    networks:
      - react_vue_network

  # ========== VUE FRONTEND (DEV WITH HOT-RELOAD) ==========
  vue-dev:
    build:
      context: ./vue
      dockerfile: Dockerfile.dev
    container_name: vue_phonebook__dev
    ports:
      - "5173:5173"
    volumes:
      - ./vue:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://api:3000
      - VITE_API_BASE_URL=/api
    stdin_open: true
    tty: true
    networks:
      - react_vue_network
    profiles:
      - dev

  # ========== REACT FRONTEND (PRODUCTION) ==========
  # react:
  #   build:
  #     context: ./react
  #     dockerfile: Dockerfile
  #   container_name: react_phonebook
  #   ports:
  #     - "8082:80"
  #   depends_on:
  #     - api
  #   networks:
  #     - react_vue_network

  # ========== REACT FRONTEND (DEV WITH HOT-RELOAD) ==========
  # react-dev:
  #   build:
  #     context: ./react
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - "5174:5173"
  #   volumes:
  #     - ./react:/app
  #     - /app/node_modules
  #   environment:
  #     - CHOKIDAR_USEPOLLING=true
  #     - VITE_API_PROXY_TARGET=http://api:3000
  #     - VITE_API_BASE_URL=/api
  #   stdin_open: true
  #   tty: true
  #   networks:
  #     - react_vue_network
  #   profiles:
  #     - dev

# Сеть для связи контейнеров
networks:
  react_vue_network:
    driver: bridge

# Том для данных PostgreSQL
volumes:
  react_vue_postgres_data: